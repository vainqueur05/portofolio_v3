{% extends 'base.html' %}

{% block title %}Logs - Administration{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4">Logs de l'application</h1>
    <pre class="bg-light p-3" style="max-height: 600px; overflow-y: scroll;color: black;">
        {% for line in logs %}
{{ line }}{% endfor %}
    </pre>
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Retour</a>
</div>
{% endblock %}
